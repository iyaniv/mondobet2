<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bracket — date outside the box (Google style)</title>
<style>
  :root{
    --c-bg:#0b1020; --c-panel:#141c34; --c-panel2:#1a2547;
    --c-border:#2a3658; --c-text:#e7ecf3; --c-muted:#6b7a99;
    --c-accent:#a3e635;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--c-bg);color:var(--c-text);padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  h1{font-size:18px;margin:0 0 4px;}
  .sub{color:var(--c-muted);font-size:13px;margin:0 0 16px;max-width:820px;}
  .toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .toolbar button{background:var(--c-panel);color:var(--c-text);border:1px solid var(--c-border);
    border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .toolbar button.on{background:var(--c-accent);color:#0b1020;border-color:var(--c-accent);}

  .bracket{display:flex;align-items:flex-start;position:relative;}
  .col{display:flex;flex-direction:column;width:250px;flex-shrink:0;}
  .conn{width:34px;flex-shrink:0;align-self:stretch;position:relative;}
  .conn svg{position:absolute;inset:0;overflow:visible;}
  .slot{display:flex;flex-direction:column;justify-content:center;}
  /* date caption ABOVE the box */
  .cap{font-size:12px;font-weight:600;color:var(--c-muted);white-space:nowrap;padding:0 6px 4px;}
  /* date header INSIDE the box (current) */
  .hdr{font-size:12px;font-weight:600;color:var(--c-muted);white-space:nowrap;padding:9px 12px 4px;}
  .card{border-radius:12px;overflow:hidden;margin:0 5px;background:var(--c-panel2);border:1px solid #34436e;}
  .row{display:flex;align-items:center;gap:8px;padding:9px 12px;}
  .row.top{border-bottom:1px solid #34436e;}
  .flag{width:24px;text-align:center;flex-shrink:0;font-size:17px;}
  .name{font-size:16px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .name.win{font-weight:700;color:var(--c-text);} .name.lose{color:var(--c-muted);}
  .row.win{background:rgba(163,230,53,.07);}
  .score{font-size:16px;font-weight:700;font-family:monospace;min-width:18px;text-align:right;}
  .score.win{color:var(--c-accent);} .score.muted{color:var(--c-muted);}
</style>
</head>
<body>
  <h1>Bracket cards — pull the date out of the box (Google style)</h1>
  <p class="sub"><b>Date above box</b>: the bordered box holds only the two teams, so the connector meets it at its true centre — clean, like Google.
  <b>Date inside box</b>: the date header makes the box top-heavy, so the line (between the teams) sits low in the box.</p>

  <div class="toolbar">
    <button id="m-above" class="on" onclick="setMode('above')">Date above box (Google style)</button>
    <button id="m-inside" onclick="setMode('inside')">Date inside box (current)</button>
  </div>

  <div class="bracket" id="bracket"></div>

<script>
  const FLAG={'South Africa':'🇿🇦','Canada':'🇨🇦','Germany':'🇩🇪','Paraguay':'🇵🇾',
    'Netherlands':'🇳🇱','Morocco':'🇲🇦','Brazil':'🇧🇷','Japan':'🇯🇵','France':'🇫🇷'};
  const f=n=>FLAG[n]||'🏳️';
  const R32=[
    {a:'South Africa',sa:0,b:'Canada',sb:1,ko:'28 Jun · 22:00'},
    {a:'Germany',sa:2,b:'Paraguay',sb:0,ko:'29 Jun · 23:30'},
    {a:'Netherlands',sa:3,b:'Morocco',sb:1,ko:'30 Jun · 04:00'},
    {a:'Brazil',sa:3,b:'Japan',sb:0,ko:'29 Jun · 20:00'},
  ];
  const R16=[
    {a:'TBD',b:'TBD',ko:'5 Jul · 00:00'},
    {a:'TBD',b:'TBD',ko:'4 Jul · 20:00'},
  ];
  const BASE=160, MODE={cur:'above'};

  function teamBox(c){
    const winA=c.sa!=null?(c.sa>c.sb):null;
    const sc=(s,w)=>c.sa!=null?`<span class="score ${w?'win':'muted'}">${s}</span>`:'';
    const nm=(n,w)=>`<span class="name ${c.sa==null?'':w?'win':'lose'}">${n}</span>`;
    const hdr = MODE.cur==='inside' ? `<div class="hdr">${c.ko}</div>` : '';
    return `<div class="card" data-card>${hdr}
      <div class="row top ${c.sa!=null&&winA?'win':''}"><span class="flag">${c.a==='TBD'?'🛡️':f(c.a)}</span>${nm(c.a,winA===true)}${sc(c.sa,winA===true)}</div>
      <div class="row ${c.sa!=null&&winA===false?'win':''}"><span class="flag">${c.b==='TBD'?'🛡️':f(c.b)}</span>${nm(c.b,winA===false)}${sc(c.sb,winA===false)}</div>
    </div>`;
  }
  function slot(c,h){
    const cap = MODE.cur==='above' ? `<div class="cap">${c.ko}</div>` : '';
    return `<div class="slot" style="height:${h}px">${cap}${teamBox(c)}</div>`;
  }
  function render(){
    document.getElementById('bracket').innerHTML=`
      <div class="col" data-col="0">${R32.map(c=>slot(c,BASE)).join('')}</div>
      <div class="conn"><svg data-svg></svg></div>
      <div class="col" data-col="1">${R16.map(c=>slot(c,BASE*2)).join('')}</div>`;
    draw();
  }
  // attach at the centre of the bordered box (the team area)
  function boxCenter(cardEl, svgTop){const r=cardEl.getBoundingClientRect();return (r.top+r.bottom)/2 - svgTop;}
  function draw(){
    const svg=document.querySelector('[data-svg]');
    const cols=[...document.querySelectorAll('[data-col]')];
    const L=[...cols[0].querySelectorAll('[data-card]')], R=[...cols[1].querySelectorAll('[data-card]')];
    const st=svg.getBoundingClientRect().top; svg.innerHTML='';
    R.forEach((rm,ri)=>{
      const y1=boxCenter(L[ri*2],st),y2=boxCenter(L[ri*2+1],st),yM=(y1+y2)/2;
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',`M0,${y1} H14 M0,${y2} H14 M14,${y1} V${y2} M14,${yM} H34`);
      p.setAttribute('stroke','rgba(163,230,53,.45)');p.setAttribute('stroke-width','1.5');p.setAttribute('fill','none');
      svg.appendChild(p);
    });
  }
  function setMode(m){MODE.cur=m;['above','inside'].forEach(k=>document.getElementById('m-'+k).classList.toggle('on',k===m));render();}
  render();
  window.addEventListener('resize',draw);
</script>
</body>
</html>
