<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MondoBet — Knockout Bracket Mock</title>
<style>
  :root{
    --bg:#0b1020;--panel:#141c34;--panel2:#1a2547;--border:#2a3658;
    --text:#e7ecf3;--muted:#6b7a99;--accent:#a3e635;--green:#10b981;
    --red:#ef4444;--indigo:#6366f1;--gold:#facc15;--blue:#3b82f6
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;min-height:100vh;display:flex;flex-direction:column}

  /* ── nav ── */
  .nav{display:flex;align-items:center;gap:8px;padding:12px 16px;
    border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
  .logo{font-weight:800;letter-spacing:.5px;color:var(--accent);font-size:18px;margin-right:6px;white-space:nowrap}
  .tab{font-size:13px;color:var(--muted);padding:6px 12px;border:1px solid var(--border);
    border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .tab.on{background:var(--accent);color:#0b1020;font-weight:700;border-color:var(--accent)}

  /* ── stage pills ── */
  .stage-bar{display:flex;gap:8px;padding:12px 16px 6px;overflow-x:auto;flex-shrink:0}
  .stage-pill{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;
    border:1px solid var(--border);background:var(--panel2);color:var(--muted);
    white-space:nowrap;transition:all .15s;flex-shrink:0}
  .stage-pill.active{background:var(--accent);color:#0b1020;border-color:var(--accent)}
  .stage-pill.done{border-color:var(--green);color:var(--green)}
  .stage-pill.locked{opacity:.45}

  /* ── section title ── */
  .section-title{padding:10px 16px 4px;font-size:12px;font-weight:700;
    color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

  /* ── bracket scroll area ── */
  .bracket-wrap{flex:1;overflow-x:auto;overflow-y:auto;padding:10px 16px 80px}
  .bracket-inner{display:flex;gap:0;align-items:flex-start;min-width:min-content}

  /* ── round column ── */
  .round-col{display:flex;flex-direction:column;flex-shrink:0;width:160px}
  .round-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;
    text-transform:uppercase;padding:0 4px 10px;text-align:center}

  /* ── connector ── */
  .connector{width:32px;flex-shrink:0;position:relative}

  /* ── matchup card ── */
  .matchup{background:var(--panel);border:1px solid var(--border);border-radius:8px;
    overflow:hidden;cursor:pointer;transition:border-color .15s;margin:0 3px}
  .matchup:hover{border-color:rgba(163,230,53,.45)}
  .matchup.live{border-color:var(--red)}
  .matchup.pending{opacity:.6}

  .matchup .team-row{display:flex;align-items:center;gap:6px;padding:6px 8px;position:relative}
  .matchup .team-row:first-child{border-bottom:1px solid var(--border)}
  .matchup .team-row.winner{background:rgba(163,230,53,.07)}
  .matchup .team-logo{font-size:15px;width:20px;text-align:center;flex-shrink:0}
  .matchup .team-seed{font-size:9px;color:var(--muted);font-weight:700;width:11px;flex-shrink:0}
  .matchup .team-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .matchup .team-name.muted{color:var(--muted);font-weight:400}
  .matchup .team-score{font-size:13px;font-weight:700;font-family:monospace;
    color:var(--accent);min-width:18px;text-align:right}
  .matchup .team-score.winner-score{color:var(--accent)}
  .matchup .team-score.loser-score{color:var(--muted)}
  .matchup .team-score.tbd{color:var(--muted);font-size:11px;font-weight:400}

  /* live dot */
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);
    flex-shrink:0;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* winner label above card */
  .winner-label{font-size:10px;font-weight:700;color:var(--muted);
    padding:0 4px 4px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .winner-label span{color:var(--accent)}

  /* ── full-width list view (stages 2+, current) ── */
  .list-view{padding:0 12px 80px}
  .match-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .match-card:hover{border-color:rgba(163,230,53,.4)}
  .match-card.live{border-color:var(--red)}
  .match-header{display:flex;align-items:center;justify-content:space-between;
    padding:6px 12px;background:var(--panel2);border-bottom:1px solid var(--border)}
  .match-header-left{font-size:11px;color:var(--muted)}
  .match-header-right{font-size:11px;color:var(--muted)}
  .match-body{display:flex;align-items:stretch}
  .match-team{flex:1;display:flex;flex-direction:column;align-items:center;
    padding:12px 8px;gap:6px}
  .match-team .logo{font-size:28px}
  .match-team .name{font-size:13px;font-weight:600;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
  .match-team .name.muted{color:var(--muted);font-weight:400}
  .match-score-col{display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:8px 12px;gap:4px;min-width:60px}
  .match-score-col .score{font-size:22px;font-weight:800;font-family:monospace;
    color:var(--accent)}
  .match-score-col .vs{font-size:13px;color:var(--muted)}
  .match-score-col .status{font-size:10px;font-weight:700;padding:2px 8px;
    border-radius:10px;background:rgba(239,68,68,.2);color:var(--red)}
  .match-score-col .status.final{background:rgba(163,230,53,.12);color:var(--accent)}
  .match-score-col .status.tbd{background:var(--panel2);color:var(--muted)}
  .match-pick-row{padding:6px 12px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:6px;font-size:11px}
  .pick-label{color:var(--muted)}
  .pick-val{font-weight:700;color:var(--indigo)}
  .pick-val.correct{color:var(--green)}
  .pick-val.wrong{color:var(--red)}
  .pick-score{color:var(--muted);margin-left:auto}
  .pick-score span{color:var(--accent);font-weight:700}

  /* ── legend ── */
  .legend{display:flex;gap:14px;padding:8px 16px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .leg-dot{width:8px;height:8px;border-radius:50%}

  /* ── demo controls ── */
  .controls{position:fixed;bottom:0;left:0;right:0;background:var(--panel2);
    border-top:1px solid var(--border);padding:10px 16px;display:flex;
    align-items:center;gap:8px;flex-wrap:wrap;z-index:50}
  .ctrl-label{font-size:11px;color:var(--muted)}
  .ctrl-btn{font-family:inherit;font-size:12px;cursor:pointer;border-radius:8px;
    border:1px solid var(--border);background:var(--panel);color:var(--text);
    padding:5px 11px;transition:all .15s}
  .ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
  .ctrl-btn.active{background:var(--accent);color:#0b1020;border-color:var(--accent);font-weight:700}
</style>
</head>
<body>

<!-- nav -->
<div class="nav">
  <span class="logo">MondoBet</span>
  <span class="tab on">🏟 Tournament</span>
  <span class="tab">Leaderboard</span>
  <span class="tab">By participant</span>
  <span class="tab">My predictions</span>
  <span class="tab">⚙ Settings</span>
</div>

<!-- stage bar -->
<div class="stage-bar">
  <div class="stage-pill done" onclick="setStage(1)">Group Stage ✓</div>
  <div class="stage-pill done" onclick="setStage(2)">Round of 32 ✓</div>
  <div class="stage-pill done" onclick="setStage(3)">Round of 16 ✓</div>
  <div class="stage-pill active" id="pill-4" onclick="setStage(4)">Quarterfinals</div>
  <div class="stage-pill" onclick="setStage(5)">Semi-finals</div>
  <div class="stage-pill locked" onclick="setStage(6)">Final &amp; 3rd 🔒</div>
</div>

<div id="view-area"></div>

<!-- demo controls -->
<div class="controls">
  <span class="ctrl-label">Demo controls:</span>
  <button class="ctrl-btn active" id="btn-bracket" onclick="setView('bracket')">Bracket view</button>
  <button class="ctrl-btn" id="btn-list" onclick="setView('list')">List view (old)</button>
  <span style="width:1px;height:18px;background:var(--border);margin:0 4px"></span>
  <span class="ctrl-label">Stage:</span>
  <button class="ctrl-btn" onclick="setStage(2)">R32</button>
  <button class="ctrl-btn" onclick="setStage(3)">R16</button>
  <button class="ctrl-btn active" id="btn-s4" onclick="setStage(4)">QF</button>
  <button class="ctrl-btn" onclick="setStage(5)">SF</button>
  <button class="ctrl-btn" onclick="setStage(6)">Final</button>
  <span style="width:1px;height:18px;background:var(--border);margin:0 4px"></span>
</div>

<script>
/* ── data ── */
const TEAMS = {
  // Group-stage winners seeded into knockouts
  GER:  {flag:"🇩🇪", name:"Germany",    seed:1},
  BRA:  {flag:"🇧🇷", name:"Brazil",     seed:2},
  ARG:  {flag:"🇦🇷", name:"Argentina",  seed:3},
  FRA:  {flag:"🇫🇷", name:"France",     seed:4},
  ENG:  {flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", name:"England",   seed:5},
  ESP:  {flag:"🇪🇸", name:"Spain",      seed:6},
  NED:  {flag:"🇳🇱", name:"Netherlands",seed:7},
  POR:  {flag:"🇵🇹", name:"Portugal",   seed:8},
  URU:  {flag:"🇺🇾", name:"Uruguay",    seed:9},
  MEX:  {flag:"🇲🇽", name:"Mexico",     seed:10},
  COL:  {flag:"🇨🇴", name:"Colombia",   seed:11},
  CHI:  {flag:"🇨🇱", name:"Chile",      seed:12},
  BEL:  {flag:"🇧🇪", name:"Belgium",    seed:13},
  SEN:  {flag:"🇸🇳", name:"Senegal",    seed:14},
  MOR:  {flag:"🇲🇦", name:"Morocco",    seed:15},
  JPN:  {flag:"🇯🇵", name:"Japan",      seed:16},
  KOR:  {flag:"🇰🇷", name:"South Korea",seed:17},
  USA:  {flag:"🇺🇸", name:"USA",        seed:18},
  AUS:  {flag:"🇦🇺", name:"Australia",  seed:19},
  CRO:  {flag:"🇭🇷", name:"Croatia",    seed:20},
};

// The full bracket tree: [stage][matchIndex] = {home, away, homeScore, awayScore, winner, status, myPick, myScore}
// status: "final" | "live" | "upcoming"
const BRACKET = {
  // Round of 32  (16 matches)
  2: [
    {home:"GER",away:"JPN",homeScore:3,awayScore:1,winner:"GER",status:"final",myPick:"GER",myScore:5},
    {home:"BRA",away:"KOR",homeScore:2,awayScore:0,winner:"BRA",status:"final",myPick:"BRA",myScore:5},
    {home:"ARG",away:"USA",homeScore:2,awayScore:1,winner:"ARG",status:"final",myPick:"USA",myScore:0},
    {home:"FRA",away:"AUS",homeScore:4,awayScore:2,winner:"FRA",status:"final",myPick:"FRA",myScore:5},
    {home:"ENG",away:"MEX",homeScore:1,awayScore:0,winner:"ENG",status:"final",myPick:"ENG",myScore:5},
    {home:"ESP",away:"CHI",homeScore:3,awayScore:2,winner:"ESP",status:"final",myPick:"ESP",myScore:5},
    {home:"NED",away:"COL",homeScore:2,awayScore:1,winner:"NED",status:"final",myPick:"COL",myScore:0},
    {home:"POR",away:"URU",homeScore:1,awayScore:0,winner:"POR",status:"final",myPick:"POR",myScore:5},
    {home:"MOR",away:"CRO",homeScore:1,awayScore:1,winner:"MOR",status:"final",myPick:"MOR",myScore:3},
    {home:"SEN",away:"BEL",homeScore:2,awayScore:0,winner:"SEN",status:"final",myPick:"BEL",myScore:0},
    {home:"GER",away:"FRA",homeScore:2,awayScore:2,winner:"GER",status:"final",myPick:"GER",myScore:3},
    {home:"BRA",away:"ARG",homeScore:2,awayScore:3,winner:"ARG",status:"final",myPick:"BRA",myScore:0},
    {home:"ENG",away:"ESP",homeScore:1,awayScore:2,winner:"ESP",status:"final",myPick:"ENG",myScore:0},
    {home:"NED",away:"POR",homeScore:0,awayScore:1,winner:"POR",status:"final",myPick:"POR",myScore:5},
    {home:"MOR",away:"SEN",homeScore:2,awayScore:1,winner:"MOR",status:"final",myPick:"SEN",myScore:0},
    {home:"JPN",away:"KOR",homeScore:3,awayScore:2,winner:"JPN",status:"final",myPick:"JPN",myScore:5},
  ],
  // Round of 16  (8 matches)
  3: [
    {home:"GER",away:"BRA",homeScore:1,awayScore:1,winner:"GER",status:"final",myPick:"BRA",myScore:0},
    {home:"ARG",away:"FRA",homeScore:2,awayScore:1,winner:"ARG",status:"final",myPick:"ARG",myScore:5},
    {home:"ENG",away:"ESP",homeScore:2,awayScore:2,winner:"ESP",status:"final",myPick:"ENG",myScore:0},
    {home:"POR",away:"MOR",homeScore:1,awayScore:0,winner:"POR",status:"final",myPick:"POR",myScore:5},
    {home:"GER",away:"ARG",homeScore:1,awayScore:2,winner:"ARG",status:"final",myPick:"GER",myScore:0},
    {home:"ESP",away:"POR",homeScore:3,awayScore:2,winner:"ESP",status:"final",myPick:"ESP",myScore:5},
    {home:"JPN",away:"SEN",homeScore:2,awayScore:1,winner:"JPN",status:"final",myPick:"SEN",myScore:0},
    {home:"MOR",away:"CRO",homeScore:0,awayScore:0,winner:"MOR",status:"final",myPick:"MOR",myScore:3},
  ],
  // Quarterfinals (4 matches — current stage)
  4: [
    {home:"ARG",away:"ESP",homeScore:2,awayScore:1,winner:"ARG",status:"final",myPick:"ESP",myScore:0},
    {home:"GER",away:"POR",homeScore:null,awayScore:null,winner:null,status:"live",myPick:"GER",myScore:null},
    {home:"JPN",away:"MOR",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:"MOR",myScore:null},
    {home:"FRA",away:"BRA",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:"BRA",myScore:null},
  ],
  // Semi-finals  (2 matches)
  5: [
    {home:"ARG",away:"?",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:"ARG",myScore:null},
    {home:"?",away:"?",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:null,myScore:null},
  ],
  // Final + 3rd place
  6: [
    {home:"?",away:"?",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:null,myScore:null,label:"3rd place"},
    {home:"?",away:"?",homeScore:null,awayScore:null,winner:null,status:"upcoming",myPick:null,myScore:null,label:"Final 🏆"},
  ],
};

let currentStage = 4;
let viewMode = "bracket";  // "bracket" | "list"

/* ── helpers ── */
function t(key) {
  if(!key || key === "?") return {flag:"❓",name:"TBD",seed:""};
  return TEAMS[key] || {flag:"🏳",name:key,seed:""};
}

/* ── stage config ── */
const STAGE_META = {
  2: {name:"Round of 32",  abbr:"R32", matchCount:16},
  3: {name:"Round of 16",  abbr:"R16", matchCount:8},
  4: {name:"Quarterfinals",abbr:"QF",  matchCount:4},
  5: {name:"Semi-finals",  abbr:"SF",  matchCount:2},
  6: {name:"Final & 3rd place", abbr:"Final", matchCount:2},
};

/* ── bracket view ── */
function matchupCard(m) {
  const home = t(m.home), away = t(m.away);
  const isLive = m.status === "live";
  const isFinal = m.status === "final";
  const homeWon = isFinal && m.winner === m.home;
  const awayWon = isFinal && m.winner === m.away;
  const cls = `matchup ${isLive?'live':''} ${m.status==='upcoming'?'pending':''}`;
  return `<div class="${cls}">
    <div class="team-row ${homeWon?'winner':''}">
      <span class="team-seed">${home.seed}</span>
      <span class="team-logo">${home.flag}</span>
      <span class="team-name ${m.home==='?'?'muted':''}">${home.name}</span>
      ${isLive
        ? `<div class="live-dot"></div>`
        : `<span class="team-score ${homeWon?'winner-score':isFinal?'loser-score':''} ${m.homeScore===null?'tbd':''}">${m.homeScore===null?'–':m.homeScore}</span>`}
    </div>
    <div class="team-row ${awayWon?'winner':''}">
      <span class="team-seed">${away.seed}</span>
      <span class="team-logo">${away.flag}</span>
      <span class="team-name ${m.away==='?'?'muted':''}">${away.name}</span>
      ${isLive
        ? `<div class="live-dot"></div>`
        : `<span class="team-score ${awayWon?'winner-score':isFinal?'loser-score':''} ${m.awayScore===null?'tbd':''}">${m.awayScore===null?'–':m.awayScore}</span>`}
    </div>
  </div>`;
}

function aboveLabel(m, s, stage) {
  const isFinal = m.status === "final";
  const isLive = m.status === "live";
  if(m.label) return `<div class="winner-label">${m.label}</div>`;
  if(isFinal && m.winner && s === stage) {
    const w = t(m.winner);
    return `<div class="winner-label">${w.flag} <span>${w.name}</span> wins</div>`;
  }
  if(isLive && s === stage) {
    return `<div class="winner-label"><div class="live-dot" style="display:inline-block;vertical-align:middle;margin-right:4px"></div><span style="color:var(--red)">LIVE</span></div>`;
  }
  return `<div style="height:14px"></div>`;
}

function renderBracket(stage) {
  // Show ALL knockout stages; current one is full-size, others are compact
  const allStages = Object.keys(BRACKET).map(Number); // [2,3,4,5,6]

  let html = `
    <div class="legend">
      <div class="legend-item"><div class="leg-dot" style="background:var(--accent)"></div> Final result</div>
      <div class="legend-item"><div class="leg-dot" style="background:var(--red)"></div> Live now</div>
      <div class="legend-item"><div class="leg-dot" style="background:var(--muted)"></div> Upcoming / TBD</div>
    </div>
    <div class="bracket-wrap">
      <div class="bracket-inner" id="bracket-inner">
  `;

  allStages.forEach((s, colIdx) => {
    const sMeta = STAGE_META[s];
    const sMatches = BRACKET[s] || [];
    const isCurrent = s === stage;
    const gap = 18;

    html += `<div class="round-col" style="opacity:${isCurrent?1:0.5}">`;
    html += `<div class="round-label" style="${isCurrent?'color:var(--accent)':''}">${sMeta.name}</div>`;

    sMatches.forEach((m, i) => {
      if(i > 0) html += `<div style="height:${gap}px"></div>`;
      html += aboveLabel(m, s, stage);
      html += matchupCard(m);
    });

    html += `</div>`; // round-col

    // connector gap
    if(colIdx < allStages.length - 1) {
      html += `<div class="connector" style="align-self:stretch;position:relative">
        <svg width="24" height="100%" style="position:absolute;inset:0;overflow:visible" id="conn-${s}"></svg>
      </div>`;
    }
  });

  html += `</div></div>`;
  return html;
}

/* ── list view (old style) ── */
function renderList(stage) {
  const matches = BRACKET[stage] || [];
  const stageName = STAGE_META[stage]?.name || "Knockout";

  let html = `
    <div class="section-title" style="padding-top:14px">${stageName}</div>
    <div class="list-view">
  `;

  matches.forEach((m,i) => {
    const home = t(m.home), away = t(m.away);
    const isLive = m.status === "live";
    const isFinal = m.status === "final";
    const homeWon = isFinal && m.winner === m.home;
    const awayWon = isFinal && m.winner === m.away;
    const pickCorrect = showPicks && m.myPick && isFinal && m.myPick === m.winner;
    const pickWrong   = showPicks && m.myPick && isFinal && m.myPick !== m.winner;

    html += `<div class="match-card ${isLive?'live':''}">
      <div class="match-header">
        <span class="match-header-left">Match ${i+1} · ${stageName}</span>
        <span class="match-header-right ${isLive?'':''}">
          ${isLive ? '<span style="color:var(--red);font-weight:700">● LIVE</span>' : isFinal ? 'Final' : 'Upcoming'}
        </span>
      </div>
      <div class="match-body">
        <div class="match-team">
          <div class="logo">${home.flag}</div>
          <div class="name ${homeWon?'':'muted'}">${home.name}</div>
        </div>
        <div class="match-score-col">
          ${isFinal
            ? `<div class="score">${m.homeScore}–${m.awayScore}</div>`
            : isLive
              ? `<div class="score" style="color:var(--red)">LIVE</div>`
              : `<div class="vs">vs</div>`}
          <div class="status ${isFinal?'final':isLive?'':'tbd'}">${isFinal?'FT':isLive?'LIVE':'TBD'}</div>
        </div>
        <div class="match-team">
          <div class="logo">${away.flag}</div>
          <div class="name ${awayWon?'':'muted'}">${away.name}</div>
        </div>
      </div>`;

    if(showPicks && m.myPick) {
      const pickTeam = t(m.myPick);
      html += `<div class="match-pick-row">
        <span class="pick-label">My pick:</span>
        <span class="pick-val ${pickCorrect?'correct':pickWrong?'wrong':''}">
          ${pickTeam.flag} ${pickTeam.name}
        </span>
        ${m.myScore !== null
          ? `<span class="pick-score">+<span>${m.myScore}</span> pts</span>`
          : `<span class="pick-score" style="color:var(--muted)">pending</span>`}
      </div>`;
    }
    html += `</div>`; // match-card
  });

  html += `</div>`; // list-view
  return html;
}

/* ── render ── */
function render() {
  const area = document.getElementById('view-area');
  area.innerHTML = viewMode === 'bracket'
    ? renderBracket(currentStage)
    : renderList(currentStage);

  // draw SVG connectors for bracket
  if(viewMode === 'bracket') {
    drawConnectors();
  }
}

function drawConnectors() {
  requestAnimationFrame(() => {
    const inner = document.getElementById('bracket-inner');
    if(!inner) return;
    const allStages = Object.keys(BRACKET).map(Number);
    const roundCols = inner.querySelectorAll('.round-col');

    allStages.slice(0,-1).forEach((s, colIdx) => {
      const svg = document.getElementById(`conn-${s}`);
      if(!svg) return;
      svg.innerHTML = '';
      const svgRect = svg.getBoundingClientRect();
      const leftCol  = roundCols[colIdx];
      const rightCol = roundCols[colIdx + 1];
      if(!leftCol || !rightCol) return;

      const leftCards  = leftCol.querySelectorAll('.matchup');
      const rightCards = rightCol.querySelectorAll('.matchup');
      const strokeColor = s === currentStage ? 'rgba(163,230,53,.35)' : '#2a3658';

      for(let ri = 0; ri < rightCards.length; ri++) {
        const li1 = leftCards[ri * 2];
        const li2 = leftCards[ri * 2 + 1];
        const rm  = rightCards[ri];
        if(!li1 || !rm) continue;

        const r1 = li1.getBoundingClientRect();
        const r2 = li2 ? li2.getBoundingClientRect() : r1;
        const rr = rm.getBoundingClientRect();

        const y1  = (r1.top + r1.bottom) / 2 - svgRect.top;
        const y2  = (r2.top + r2.bottom) / 2 - svgRect.top;
        const yM  = (y1 + y2) / 2;
        const yT  = (rr.top + rr.bottom) / 2 - svgRect.top;
        const x0=0, xM=12, x1=24;

        const path = `M${x0},${y1} H${xM} V${y2} M${x0},${y2} H${xM} V${yM} H${x1} M${xM},${yM} V${yT} H${x1}`;
        const el = document.createElementNS('http://www.w3.org/2000/svg','path');
        el.setAttribute('d', path);
        el.setAttribute('stroke', strokeColor);
        el.setAttribute('stroke-width', '1.5');
        el.setAttribute('fill', 'none');
        svg.appendChild(el);
      }
    });
  });
}

/* ── controls ── */
function setStage(s) {
  currentStage = s;
  // update stage pills
  document.querySelectorAll('.stage-pill').forEach((p,i) => {
    p.classList.remove('active');
  });
  const stageNums = [1,2,3,4,5,6];
  // pill 0 = stage 1 (group, skip), 1=R32, etc
  const idx = stageNums.indexOf(s);
  if(idx >= 0) document.querySelectorAll('.stage-pill')[idx]?.classList.add('active');

  // update ctrl buttons
  ['btn-s2','btn-s3','btn-s4','btn-s5','btn-s6'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  const stageAbbrs = {2:'s2',3:'s3',4:'s4',5:'s5',6:'s6'};
  const ab = stageAbbrs[s];
  if(ab) document.getElementById('btn-'+ab)?.classList.add('active');

  render();
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('btn-bracket')?.classList.toggle('active', mode==='bracket');
  document.getElementById('btn-list')?.classList.toggle('active', mode==='list');
  render();
}

document.addEventListener('DOMContentLoaded', render);

render();
window.addEventListener('resize', () => { if(viewMode==='bracket') drawConnectors(); });
</script>
</body>
</html>
