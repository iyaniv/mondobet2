<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MondoBet — Compare forms (mock + demo)</title>
<style>
  :root{--bg:#0b1020;--panel:#141c34;--panel2:#1a2547;--border:#2a3658;--text:#e7ecf3;
    --muted:#6b7a99;--accent:#a3e635;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--indigo:#6366f1;--gold:#facc15}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .nav{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{font-weight:800;letter-spacing:.5px;color:var(--accent);font-size:18px;margin-right:6px}
  .tab{font-size:14px;color:var(--muted);padding:7px 13px;border:1px solid var(--border);border-radius:8px}
  .tab.on{background:var(--accent);color:#0b1020;font-weight:700;border-color:var(--accent)}
  .tab.gone{text-decoration:line-through;opacity:.4;position:relative}
  .gonetag{font-size:9px;color:var(--red);position:absolute;top:-8px;left:50%;transform:translateX(-50%);white-space:nowrap}
  .wrap{max-width:900px;margin:20px auto;padding:0 16px}
  h2{font-size:18px;margin:0 0 12px}
  .muted{color:var(--muted)}
  .btn{font-family:inherit;cursor:pointer;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);padding:7px 13px;font-size:13px}
  .btn.accent{background:var(--accent);color:#0b1020;border-color:var(--accent);font-weight:700}
  select{font-family:inherit;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px}

  /* leaderboard */
  .lb{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead tr{background:var(--panel2)}
  th{padding:9px 8px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);text-align:left}
  th.c{text-align:center;width:42px}
  td{padding:10px 8px;border-bottom:1px solid rgba(42,54,88,.45)}
  tr.row{cursor:pointer}
  tr.row:hover{background:rgba(163,230,53,.06)}
  .pts{text-align:center;color:var(--accent);font-weight:700;font-family:monospace;font-size:16px}
  .you{background:var(--indigo);color:#fff;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:6px}
  .vsbtn{text-align:right;color:var(--muted);font-size:12px;white-space:nowrap}
  tr.row:hover .vsbtn{color:var(--accent)}

  /* compare header */
  .cmpbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .totals{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:stretch;margin-bottom:14px}
  .tcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
  .tcard .nm{font-size:12px;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcard .v{font-size:26px;font-weight:800;font-family:monospace;color:var(--accent)}
  .tcard.you{border-top:3px solid var(--indigo)}
  .tcard.them{border-top:3px solid var(--gold)}
  .diff{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}
  .diff b{font-size:20px;font-family:monospace}

  .livebanner{display:flex;align-items:center;gap:10px;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.4);
    border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:13px}

  .stagehdr{color:var(--indigo);font-weight:700;font-size:13px;margin:14px 0 6px;padding:6px 10px;background:var(--panel2);border-radius:6px}

  /* compare row */
  .crow{display:grid;grid-template-columns:46px 1fr 150px 1fr 46px;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:6px 8px;margin-bottom:4px}
  .crow.live{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.05)}
  .predbox{font-family:monospace;font-weight:700;font-size:14px;padding:3px 9px;border-radius:5px;text-align:center;white-space:nowrap}
  .chip{font-family:monospace;font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px;white-space:nowrap;display:inline-block}
  .pcell{display:flex;align-items:center;gap:6px}
  .pcell.left{justify-content:flex-end}
  .pcell.right{justify-content:flex-start}
  .center{display:flex;flex-direction:column;align-items:center;gap:3px}
  .teams{font-size:11px;color:var(--text);white-space:nowrap;text-align:center;line-height:1.3}
  .teams .n{color:var(--muted)}
  .res{font-family:monospace;font-weight:700;font-size:11px;padding:1px 7px;border-radius:4px;white-space:nowrap}
  .res.final{background:rgba(48,209,88,.14);border:1px solid rgba(48,209,88,.4);color:var(--green)}
  .res.live{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.4);color:var(--red)}
  .res.none{background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:4px;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  @keyframes flash{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 4px rgba(239,68,68,.25)}}
  .flash{animation:flash 1.4s ease-out 2}
  .colhdr{display:grid;grid-template-columns:46px 1fr 150px 1fr 46px;gap:6px;padding:0 8px;margin-bottom:6px;font-size:10px;
    text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .colhdr .l{grid-column:1 / 3;text-align:right}
  .colhdr .c{grid-column:3;text-align:center}
  .colhdr .r{grid-column:4 / 6;text-align:left}
  .hide{display:none}
</style></head>
<body>
  <div class="nav">
    <span class="logo">MONDOBET</span>
    <span class="tab">🏟 Tournament</span>
    <span class="tab on">Leaderboard</span>
    <span class="tab gone">By participant<span class="gonetag">removed</span></span>
    <span class="tab">My predictions</span>
    <span class="tab">⚙ Settings</span>
  </div>
  <div class="wrap">

    <!-- ===== LEADERBOARD SCREEN ===== -->
    <div id="lbScreen">
      <h2>🏆 Leaderboard <span class="muted" style="font-size:13px">— click any form to compare it with yours</span></h2>
      <div class="lb">
        <table>
          <thead><tr><th class="c">#</th><th>Name</th><th class="c">Points</th><th>Winner pick</th><th></th></tr></thead>
          <tbody id="lbBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== COMPARE SCREEN ===== -->
    <div id="cmpScreen" class="hide">
      <div class="cmpbar">
        <button class="btn" onclick="showLb()">← Back to leaderboard</button>
        <h2 id="cmpTitle" style="margin:0;flex:1"></h2>
        <label class="muted" style="font-size:12px">Compare to:
          <select id="cmpSelect" onchange="renderCompare(this.value)"></select>
        </label>
      </div>

      <div id="liveBanner" class="livebanner hide">
        <span><span class="dot"></span><b>Live now</b> — <span id="liveLabel"></span></span>
        <button class="btn" style="margin-left:auto" onclick="jumpLive()">Jump to live ↓</button>
      </div>

      <div class="totals">
        <div class="tcard you"><div class="nm">YOU · Alice — main</div><div class="v" id="youTotal">0</div></div>
        <div class="diff"><span>diff</span><b id="diffVal">0</b></div>
        <div class="tcard them"><div class="nm" id="themName">—</div><div class="v" id="themTotal" style="color:var(--gold)">0</div></div>
      </div>

      <div class="colhdr"><span class="l">Your pick · pts</span><span class="c">Match · result</span><span class="r">pts · their pick</span></div>
      <div id="cmpRows"></div>
    </div>

  </div>

<script>
const F = {green:'#10b981',orange:'#f59e0b',red:'#ef4444',muted:'#6b7a99',text:'#e7ecf3',accent:'#a3e635'};
// stage label, teams, actual result/live
const MATCHES = [
  {n:73,a:'Mexico',b:'South Africa',fa:'🇲🇽',fb:'🇿🇦',stage:'Round of 32',result:[2,1],live:null},
  {n:74,a:'Argentina',b:'Australia',fa:'🇦🇷',fb:'🇦🇺',stage:'Round of 32',result:[1,0],live:null},
  {n:75,a:'France',b:'Poland',fa:'🇫🇷',fb:'🇵🇱',stage:'Round of 32',result:[3,1],live:null},
  {n:76,a:'England',b:'Senegal',fa:'🏴',fb:'🇸🇳',stage:'Round of 32',result:[0,0],live:null},
  {n:77,a:'Brazil',b:'Korea Rep.',fa:'🇧🇷',fb:'🇰🇷',stage:'Round of 32',result:null,live:{score:[1,1],minute:67}},
  {n:78,a:'Japan',b:'Croatia',fa:'🇯🇵',fb:'🇭🇷',stage:'Round of 32',result:null,live:null},
  {n:79,a:'Portugal',b:'Switzerland',fa:'🇵🇹',fb:'🇨🇭',stage:'Round of 32',result:null,live:null},
];
const ME = {name:'Alice — main', preds:{73:[2,1],74:[2,0],75:[2,1],76:[1,0],77:[2,1],78:[1,1],79:[3,0]}};
const FORMS = {
  bob:    {name:'Bob — Bracket A', winner:'Brazil',    preds:{73:[1,0],74:[1,0],75:[3,1],76:[0,1],77:[1,0],78:[2,2],79:[2,1]}},
  diana:  {name:'Diana',           winner:'France',    preds:{73:[2,1],74:[2,1],75:[1,1],76:[0,0],77:[0,2],78:[1,0],79:[1,1]}},
  charlie:{name:'Charlie',         winner:'Argentina', preds:{73:[3,2],74:[1,0],75:[2,0],76:[2,1],77:[2,2],78:[0,1],79:[1,2]}},
};
const LB = [
  {key:'bob',rank:1,total:524,winner:'🇧🇷 Brazil'},
  {key:'me', rank:2,total:464,winner:'🇫🇷 France',me:true,name:'Alice — main'},
  {key:'charlie',rank:3,total:441,winner:'🇦🇷 Argentina'},
  {key:'diana',rank:4,total:420,winner:'🇫🇷 France'},
];

function eff(m){ return m.result ? {s:m.result,live:false} : (m.live ? {s:m.live.score,live:true,min:m.live.minute} : null); }
// scoring: dir(5) + exact(3 both / 1 one)
function score(pred,res){
  if(!pred||!res) return null;
  const sign=x=>x===0?0:x>0?1:-1;
  const dir = sign(pred[0]-pred[1])===sign(res[0]-res[1]) ? 5 : 0;
  const g = (pred[0]===res[0]?1:0)+(pred[1]===res[1]?1:0);
  const exact = g===2?3:g===1?1:0;
  return {total:dir+exact, aMatch:pred[0]===res[0], bMatch:pred[1]===res[1]};
}
function palette(total){ return total>=5?F.green:total===1?F.orange:F.red; }
function predBox(pred,res){
  if(!pred) return '<span class="predbox" style="background:#0b1020;border:1px solid var(--border);color:var(--muted)">—</span>';
  if(!res)  return '<span class="predbox" style="background:#0b1020;border:1px solid var(--border);color:var(--text)">'+pred[0]+':'+pred[1]+'</span>';
  const sc=score(pred,res); const pal=palette(sc.total);
  const bg = pal===F.green?'rgba(16,185,129,0.14)':pal===F.orange?'rgba(245,158,11,0.14)':'rgba(239,68,68,0.14)';
  const a='<span style="color:'+(sc.aMatch?F.green:F.red)+'">'+pred[0]+'</span>';
  const b='<span style="color:'+(sc.bMatch?F.green:F.red)+'">'+pred[1]+'</span>';
  return '<span class="predbox" style="background:'+bg+';border:1px solid '+pal+'">'+a+':'+b+'</span>';
}
function ptsChip(pred,res){
  const sc=score(pred,res); if(!sc) return '';
  const pal=palette(sc.total);
  const bg = pal===F.green?'rgba(16,185,129,0.14)':pal===F.orange?'rgba(245,158,11,0.14)':'rgba(239,68,68,0.14)';
  return '<span class="chip" style="background:'+bg+';border:1px solid '+pal+';color:'+pal+'">+'+sc.total+'</span>';
}
function resChip(m){
  const e=eff(m);
  if(!e) return '<span class="res none">— : —</span>';
  if(e.live) return '<span class="res live"><span class="dot"></span>'+e.s[0]+':'+e.s[1]+' '+e.min+"′</span>";
  return '<span class="res final">✓ '+e.s[0]+':'+e.s[1]+'</span>';
}

function buildLb(){
  document.getElementById('lbBody').innerHTML = LB.map(r=>{
    const f = r.me?ME:FORMS[r.key];
    const nm = r.me? (r.name+' <span class="you">YOU</span>') : f.name;
    const click = r.me?'' : 'onclick="openCompare(\''+r.key+'\')"';
    const cls = r.me?'':'row';
    return '<tr class="'+cls+'" '+click+'><td class="c"><b>'+r.rank+'</b></td><td>'+nm+'</td>'
      +'<td class="pts">'+r.total+'</td><td>'+r.winner+'</td>'
      +'<td class="vsbtn">'+(r.me?'':'compare →')+'</td></tr>';
  }).join('');
}

let liveRowId=null;
function renderCompare(key){
  const them = FORMS[key];
  document.getElementById('cmpTitle').innerHTML = 'You <span class="muted">vs</span> '+them.name;
  document.getElementById('themName').textContent = them.name;
  document.getElementById('cmpSelect').value = key;
  let you=0, th=0, rows='', lastStage=null, liveLabel=null; liveRowId=null;
  MATCHES.forEach(m=>{
    const e=eff(m);
    const myP = ME.preds[m.n], thP = them.preds[m.n];
    if(e){ const a=score(myP,e.s), b=score(thP,e.s); if(a)you+=a.total; if(b)th+=b.total; }
    if(m.stage!==lastStage){ rows+='<div class="stagehdr">▸ '+m.stage+'</div>'; lastStage=m.stage; }
    const isLive = e&&e.live;
    const rid = 'm'+m.n;
    if(isLive){ liveRowId=rid; liveLabel=m.fa+' '+m.a+' v '+m.b+' '+m.fb+' · '+e.s[0]+':'+e.s[1]+' '+e.min+"′"; }
    rows += '<div class="crow'+(isLive?' live':'')+'" id="'+rid+'">'
      + '<div class="pcell left">'+ptsChip(myP,e&&e.s)+'</div>'
      + '<div class="pcell left">'+predBox(myP,e&&e.s)+'</div>'
      + '<div class="center"><div class="teams">'+m.fa+' '+m.a+' <span class="n">v</span> '+m.b+' '+m.fb+'</div>'+resChip(m)+'</div>'
      + '<div class="pcell right">'+predBox(thP,e&&e.s)+'</div>'
      + '<div class="pcell right">'+ptsChip(thP,e&&e.s)+'</div>'
      + '</div>';
  });
  document.getElementById('cmpRows').innerHTML = rows;
  document.getElementById('youTotal').textContent = you;
  document.getElementById('themTotal').textContent = th;
  const d = you-th;
  document.getElementById('diffVal').textContent = (d>0?'+':'')+d;
  document.getElementById('diffVal').style.color = d>0?F.green:d<0?F.red:F.muted;
  const lb = document.getElementById('liveBanner');
  if(liveRowId){ lb.classList.remove('hide'); document.getElementById('liveLabel').textContent=liveLabel; setTimeout(jumpLive,250); }
  else lb.classList.add('hide');
}
function jumpLive(){ if(!liveRowId) return; const el=document.getElementById(liveRowId);
  el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
function openCompare(key){
  document.getElementById('cmpSelect').innerHTML = Object.keys(FORMS).map(k=>'<option value="'+k+'">'+FORMS[k].name+'</option>').join('');
  document.getElementById('lbScreen').classList.add('hide');
  document.getElementById('cmpScreen').classList.remove('hide');
  renderCompare(key);
  window.scrollTo(0,0);
}
function showLb(){ document.getElementById('cmpScreen').classList.add('hide'); document.getElementById('lbScreen').classList.remove('hide'); }
buildLb();
</script>
</body></html>
