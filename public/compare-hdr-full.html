<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MondoBet — Compare header options (in context)</title>
<style>
  :root{--bg:#0b1020;--panel:#141c34;--panel2:#1a2547;--border:#2a3658;--text:#e7ecf3;
    --muted:#6b7a99;--accent:#a3e635;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--indigo:#6366f1;--gold:#facc15}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .nav{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{font-weight:800;letter-spacing:.5px;color:var(--accent);font-size:18px;margin-right:6px}
  .tab{font-size:14px;color:var(--muted);padding:7px 13px;border:1px solid var(--border);border-radius:8px}
  .tab.on{background:var(--accent);color:#0b1020;font-weight:700;border-color:var(--accent)}
  .wrap{max-width:900px;margin:16px auto;padding:0 16px}
  .switch{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .switch .ttl{font-size:12px;color:var(--muted);margin-right:4px}
  .switch button{font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border-radius:999px;padding:6px 14px;
    background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  .switch button.on{background:var(--accent);color:#0b1020;border-color:var(--accent)}
  .btn{font-family:inherit;cursor:pointer;border-radius:8px;border:1px solid var(--accent);background:rgba(163,230,53,.10);color:var(--accent);padding:9px 18px;font-size:13.5px;font-weight:700;margin-bottom:10px}

  .today{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .today .t{font-weight:800;letter-spacing:.5px;font-size:13px}.today .d{color:var(--muted);font-size:12px}
  .gcard{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:5px 10px;font-size:12.5px;margin-left:auto}
  .livep{display:inline-flex;align-items:center;gap:4px;color:var(--red);font-weight:700;font-size:10px;text-transform:uppercase}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}

  /* scoreboard pieces */
  .grp{display:flex;align-items:stretch;gap:8px;border:1px solid var(--border);border-radius:10px;padding:6px;background:var(--panel)}
  .tile{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;min-width:62px;padding:5px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border)}
  .tlabel{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .tval{font-size:19px;font-family:monospace;font-weight:800;line-height:1.15}
  .tval.rank{color:var(--text)}.tval.pts{color:var(--accent)}
  .nameblk{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 12px;min-width:120px;max-width:220px}
  .nameblk .nm{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap}
  .nameblk .win{font-size:11px;color:var(--muted);white-space:nowrap;margin-top:1px}
  .picker{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;min-width:120px;max-width:220px;padding:5px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--accent)}
  .picker .nm{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
  .picker .nm .car{font-size:8px;opacity:.7;margin-left:4px}
  .picker .win{font-size:11px;color:var(--muted);white-space:nowrap;margin-top:1px}
  .gapb{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:56px}
  .gapb .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .gapb b{font-size:22px;font-family:monospace;line-height:1.1}

  /* layout variants applied on #board */
  #board.lay-A{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:stretch}
  #board.lay-A .grp{justify-content:center}
  #board.lay-B{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:stretch}
  #board.lay-B .grp{justify-content:center}
  #board.lay-C{display:flex;justify-content:center;align-items:stretch;gap:14px}
  #board.lay-C .grp{flex:0 0 auto}
  #board.lay-D{display:flex;justify-content:center;align-items:stretch;gap:10px}
  #board.lay-D .grp{border:none;background:transparent;padding:0}
  #board{margin-bottom:10px}

  .colhdr{display:grid;grid-template-columns:44px 1fr 210px 1fr 44px;gap:6px;padding:0 8px;margin-bottom:6px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .colhdr .l{grid-column:1/3;text-align:right}.colhdr .c{grid-column:3;text-align:center}.colhdr .r{grid-column:4/6;text-align:left}
  .stagehdr{color:var(--indigo);font-weight:700;font-size:13px;margin:8px 0 6px;padding:6px 10px;background:var(--panel2);border-radius:6px}
  .crow{display:grid;grid-template-columns:44px 1fr 210px 1fr 44px;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:6px 8px;margin-bottom:4px}
  .crow.live{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.05)}
  .predbox{font-family:monospace;font-weight:700;font-size:14px;padding:3px 9px;border-radius:5px;white-space:nowrap}
  .chip{font-family:monospace;font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px;white-space:nowrap;display:inline-block}
  .teams{font-size:11px;text-align:center;line-height:1.3}.teams .n{color:var(--muted)}
  .res{font-family:monospace;font-weight:700;font-size:11px;padding:1px 7px;border-radius:4px;white-space:nowrap}
  .res.final{background:rgba(48,209,88,.14);border:1px solid rgba(48,209,88,.4);color:var(--green)}
  .res.live{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.4);color:var(--red)}
  .center{display:flex;flex-direction:column;align-items:center;gap:3px}
  .le{display:flex;justify-content:flex-end}.ls{display:flex;justify-content:flex-start}.tr{text-align:right}.tl{text-align:left}
</style></head>
<body>
  <div class="nav"><span class="logo">MONDOBET</span><span class="tab">🏟 Tournament</span><span class="tab on">Leaderboard</span><span class="tab">My predictions</span><span class="tab">⚙ Settings</span></div>
  <div class="wrap">
    <div class="switch"><span class="ttl">Header layout:</span>
      <button data-l="A" onclick="setLay('A')">A · Centered</button>
      <button data-l="B" class="on" onclick="setLay('B')">B · Mirrored</button>
      <button data-l="C" onclick="setLay('C')">C · Compact</button>
      <button data-l="D" onclick="setLay('D')">D · No boxes</button>
    </div>
    <div class="today"><span class="t">⚽ TODAY'S GAMES</span><span class="d">Thursday, June 4</span>
      <span class="gcard"><span class="livep"><span class="dot"></span>Live</span> 🇧🇷 Brazil <b>1–1</b> Korea Rep. 🇰🇷 <span style="color:var(--muted)">67′</span></span></div>
    <button class="btn">← Back to leaderboard</button>
    <div id="board"></div>
    <div class="colhdr"><span class="l">Your pick · pts</span><span class="c">Match · result</span><span class="r">pts · their pick</span></div>
    <div id="rows"></div>
  </div>
<script>
const F={green:'#10b981',orange:'#f59e0b',red:'#ef4444',muted:'#6b7a99'};
const MATCHES=[
 {n:73,a:'Mexico',b:'South Africa',fa:'🇲🇽',fb:'🇿🇦',res:[2,1],live:0},
 {n:74,a:'Argentina',b:'Australia',fa:'🇦🇷',fb:'🇦🇺',res:[1,0],live:0},
 {n:75,a:'France',b:'Poland',fa:'🇫🇷',fb:'🇵🇱',res:[3,1],live:0},
 {n:76,a:'England',b:'Senegal',fa:'🏴',fb:'🇸🇳',res:[0,0],live:0},
 {n:77,a:'Brazil',b:'Korea Rep.',fa:'🇧🇷',fb:'🇰🇷',res:null,live:{s:[1,1],m:67}},
 {n:78,a:'Japan',b:'Croatia',fa:'🇯🇵',fb:'🇭🇷',res:null,live:0},
];
const MINE={73:[2,1],74:[2,0],75:[2,1],76:[1,0],77:[2,1],78:[1,1]};
const THEM={73:[1,0],74:[1,0],75:[3,1],76:[0,1],77:[1,0],78:[2,2]};
const ME={name:'Yaniv Itzhaki',rank:4,total:0,win:'🏆 🇫🇷 France'};
const TH={name:'Brunson',rank:1,total:0,win:'🏆 🇪🇸 Spain'};
function eff(m){return m.res?{s:m.res,live:false}:(m.live?{s:m.live.s,live:true,m:m.live.m}:null);}
function score(p,e){if(!p||!e)return null;const sg=x=>x===0?0:x>0?1:-1;const dir=sg(p[0]-p[1])===sg(e[0]-e[1])?5:0;const g=(p[0]===e[0]?1:0)+(p[1]===e[1]?1:0);return{t:dir+(g===2?3:g===1?1:0),a:p[0]===e[0],b:p[1]===e[1]};}
const pal=t=>t>=5?F.green:t===1?F.orange:F.red, bg=t=>t>=5?'rgba(16,185,129,.14)':t===1?'rgba(245,158,11,.14)':'rgba(239,68,68,.14)';
function box(p,e){if(!p)return '<span class="predbox" style="background:var(--bg);border:1px solid var(--border);color:var(--muted)">—</span>';if(!e)return '<span class="predbox" style="background:var(--bg);border:1px solid var(--border)">'+p[0]+':'+p[1]+'</span>';const s=score(p,e);return '<span class="predbox" style="background:'+bg(s.t)+';border:1px solid '+pal(s.t)+'"><span style="color:'+(s.a?F.green:F.red)+'">'+p[0]+'</span>:<span style="color:'+(s.b?F.green:F.red)+'">'+p[1]+'</span></span>';}
function chip(p,e){const s=score(p,e);if(!s)return '';return '<span class="chip" style="background:'+bg(s.t)+';border:1px solid '+pal(s.t)+';color:'+pal(s.t)+'">+'+s.t+'</span>';}
function rchip(m){const e=eff(m);if(!e)return '<span class="res" style="background:var(--panel2);border:1px solid var(--border);color:var(--muted)">— : —</span>';if(e.live)return '<span class="res live"><span class="dot"></span>'+e.s[0]+':'+e.s[1]+' '+e.m+"′</span>";return '<span class="res final">✓ '+e.s[0]+':'+e.s[1]+'</span>';}

const yourTiles = '<div class="tile"><span class="tlabel">Rank</span><b class="tval rank">#'+ME.rank+'</b></div><div class="tile"><span class="tlabel">Points</span><b class="tval pts">'+ME.total+'</b></div>';
const nameYou = '<div class="nameblk"><span class="tlabel">Your form</span><span class="nm">'+ME.name+'</span><span class="win">'+ME.win+'</span></div>';
const theirTiles = '<div class="tile"><span class="tlabel">Rank</span><b class="tval rank">#'+TH.rank+'</b></div><div class="tile"><span class="tlabel">Points</span><b class="tval pts">'+TH.total+'</b></div>';
const theirTilesMir = '<div class="tile"><span class="tlabel">Points</span><b class="tval pts">'+TH.total+'</b></div><div class="tile"><span class="tlabel">Rank</span><b class="tval rank">#'+TH.rank+'</b></div>';
const picker = '<div class="picker"><span class="tlabel">Compare to</span><span class="nm">'+TH.name+'<span class="car">▾</span></span><span class="win">'+TH.win+'</span></div>';
const gapb = '<div class="gapb"><span class="lbl">gap</span><b style="color:'+F.muted+'">0</b></div>';

function header(lay){
  const left='<div class="grp">'+nameYou+yourTiles+'</div>';
  const rightNormal='<div class="grp">'+theirTiles+picker+'</div>';
  const rightMir='<div class="grp">'+theirTilesMir+picker+'</div>';
  if(lay==='A') return left+gapb+rightNormal;
  return left+gapb+rightMir; // B, C, D all mirrored
}
function setLay(l){
  document.querySelectorAll('.switch button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  const bd=document.getElementById('board'); bd.className='lay-'+l; bd.innerHTML=header(l);
}
function rows(){
  let h='<div class="stagehdr">▸ Round of 32</div>';
  MATCHES.forEach(m=>{const e=eff(m);const live=e&&e.live;let ws=null;if(e){if(e.s[0]>e.s[1])ws=0;else if(e.s[1]>e.s[0])ws=1;}
    h+='<div class="crow'+(live?' live':'')+'">'
     +'<span class="tr">'+chip(MINE[m.n],e&&e.s)+'</span>'
     +'<span class="le">'+box(MINE[m.n],e&&e.s)+'</span>'
     +'<div class="center"><span class="teams"><span style="color:'+(ws===0?'var(--accent)':'var(--text)')+';font-weight:'+(ws===0?700:400)+'">'+m.fa+' '+m.a+'</span><span class="n"> v </span><span style="color:'+(ws===1?'var(--accent)':'var(--text)')+';font-weight:'+(ws===1?700:400)+'">'+m.b+' '+m.fb+'</span></span>'+rchip(m)+'</div>'
     +'<span class="ls">'+box(THEM[m.n],e&&e.s)+'</span>'
     +'<span class="tl">'+chip(THEM[m.n],e&&e.s)+'</span>'
     +'</div>';
  });
  document.getElementById('rows').innerHTML=h;
}
setLay('B'); rows();
</script>
</body></html>
